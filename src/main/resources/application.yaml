spring:
  application:
    name: Proyecto-Primer-Parcial-de-Software-Seguro
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    # Si detecta las variables de entorno (en Render), las usa. 
    # Si no (en tu compu), usa tu configuración local.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/proyecto_seguro}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  # Render inyecta automáticamente una variable de entorno llamada PORT.
  # Es buena práctica dejar que Render decida el puerto en producción.
  port: ${PORT:8080}